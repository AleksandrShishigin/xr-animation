<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>model-viewer animation</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }
    .card {
      max-width: 1000px;
      margin: 0 auto 24px;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    model-viewer {
      width: 100%;
      height: 520px;
      background: #e9eef5;
      border-radius: 12px;
      display: block;
    }
    button {
      margin-top: 16px;
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <script>
    // 👇 ВАЖНО: впиши сюда точное имя своего .glb файла
    const MODEL_SRC = "./model_animated.glb";
  </script>

  <div class="card">
    <h2>1. Autoplay: climb</h2>
    <model-viewer
      id="viewer1"
      camera-controls
      autoplay
      animation-name="climb"
      animation-crossfade-duration="500">
    </model-viewer>
  </div>

  <div class="card">
    <h2>2. climb → idle</h2>
    <model-viewer
      id="viewer2"
      camera-controls
      animation-name="climb"
      animation-crossfade-duration="800">
    </model-viewer>

    <button id="playBtn">Запустить climb → idle</button>
  </div>

  <script>
    const viewer1 = document.getElementById('viewer1');
    const viewer2 = document.getElementById('viewer2');
    const playBtn = document.getElementById('playBtn');

    // подставляем путь к модели в оба viewer
    viewer1.src = MODEL_SRC;
    viewer2.src = MODEL_SRC;

    const SPEED = 150;

    viewer1.addEventListener('load', () => {
      viewer1.timeScale = SPEED;
      viewer1.play();
    });

    let timer;

    function playSequence() {
      clearTimeout(timer);

      viewer2.timeScale = SPEED;
      viewer2.animationName = 'climb';
      viewer2.currentTime = 0;
      viewer2.play();

      timer = setTimeout(() => {
        viewer2.animationName = 'idle';
        viewer2.currentTime = 0;
        viewer2.play();
      }, 4000);
    }

    viewer2.addEventListener('load', () => {
      viewer2.timeScale = SPEED;
      playSequence();
    });

    playBtn.addEventListener('click', playSequence);
  </script>

</body>
</html>
