<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Animation</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
    }
    model-viewer {
      width: 100%;
      height: 90vh;
    }
    button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<model-viewer
  src="model_animated.glb"
  camera-controls
  autoplay
  animation-name="climb">
</model-viewer>

<button onclick="playClimb()">climb</button>
<button onclick="playIdle()">idle</button>

<script>
const viewer = document.querySelector('model-viewer');

function playClimb() {
  viewer.animationName = 'climb';
}

function playIdle() {
  viewer.animationName = 'idle';
}
</script>

</body>
</html>
