<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Viewer Animation Demo</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }
    h1, h2 {
      margin: 0 0 16px;
    }
    .section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    model-viewer {
      width: 100%;
      max-width: 700px;
      height: 420px;
      background: #e9eef5;
      border-radius: 12px;
      display: block;
      margin-bottom: 16px;
    }
    button {
      padding: 10px 16px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      background: #222;
      color: white;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Анимации model-viewer</h1>

  <div class="section">
    <h2>1. Autoplay (climb)</h2>
    <model-viewer
      src="./model_animated.glb"
      camera-controls
      autoplay
      animation-name="climb">
    </model-viewer>
  </div>

  <div class="section">
    <h2>2. climb → idle (кнопка)</h2>
    <model-viewer
      id="viewer2"
      src="./model_animated.glb"
      camera-controls
      autoplay
      animation-name="climb">
    </model-viewer>

    <button id="startBtn">Запустить climb → idle</button>
  </div>

  <script>
    const viewer2 = document.getElementById('viewer2');
    const startBtn = document.getElementById('startBtn');

    function playSequence() {
      viewer2.animationName = 'climb';
      viewer2.currentTime = 0;
      viewer2.play();

      setTimeout(() => {
        viewer2.animationName = 'idle';
        viewer2.currentTime = 0;
        viewer2.play();
      }, 2500); // подстрой под длину climb
    }

    viewer2.addEventListener('load', () => {
      playSequence();
    });

    startBtn.addEventListener('click', () => {
      playSequence();
    });
  </script>
</body>
</html>
